<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Réservation et Suivi</mat-card-title>
      <mat-card-subtitle>Croix-Rouge Française</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p>Connectez-vous avec votre compte Okta pour accéder à la réservation et au suivi des véhicules.</p>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary" (click)="login()">
        Se connecter avec Okta
      </button>
    </mat-card-actions>
  </mat-card>
</div>

services:
  # Valkey 8 Bundle - iso Google Cloud Memorystore for Valkey 8 (JSON, Search, etc.)
  valkey:
    image: valkey/valkey-bundle:8
    container_name: clef-valkey
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - clef-network

  # Backend - FastAPI with Python 3.13
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: clef-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-cache:/root/.cache
    env_file:
      - ./backend/.env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_HOST=valkey
      - REDIS_PORT=6379
      - REDIS_URL=redis://valkey:6379/0
      - ENV=dev
    depends_on:
      valkey:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - clef-network

  # Frontend Admin - Angular 21
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: clef-frontend-admin
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend-cache:/root/.npm
    environment:
      - NODE_ENV=development
      - API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    command: npm run start -- --project=admin --host 0.0.0.0 --port 4200 --poll 2000
    networks:
      - clef-network

  # Frontend Form - Angular 21
  frontend-form:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: clef-frontend-form
    ports:
      - "4202:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend-form-cache:/root/.npm
    environment:
      - NODE_ENV=development
      - API_URL=http://localhost:8000
    depends_on:
      backend:
        condition: service_healthy
    command: npm run start -- --project=form --host 0.0.0.0 --port 4200 --poll 2000
    networks:
      - clef-network

networks:
  clef-network:
    driver: bridge

volumes:
  valkey-data:
  backend-cache:
  frontend-cache:
  frontend-form-cache:

